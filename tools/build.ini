[pyinstaller]
entry_point = src/mindit/__main__.py
project = MindIt

exclude_modules =
    matplotlib
    test
    pydoc

collect_all =
    googleapiclient
    google
    google.api_core
    google.auth
    google.oauth2
    httplib2
    tkinter

hidden_imports =
    email
    tkinter
    tkinter.filedialog
    winsound
    